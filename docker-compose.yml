services:
  app-db:
    image: postgres:16-alpine
    container_name: devsu-app-db
    environment:
      POSTGRES_DB: devsu_db
      POSTGRES_USER: devsu
      POSTGRES_PASSWORD: devsu
    ports:
      - "5432:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/BaseDatos.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsu -d devsu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: devsu-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: customer-service
    container_name: devsu-customer-service
    depends_on:
      app-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      CUSTOMER_DB_URL: jdbc:postgresql://app-db:5432/devsu_db?currentSchema=customer_service
      CUSTOMER_DB_USERNAME: devsu
      CUSTOMER_DB_PASSWORD: devsu
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CUSTOMER_EVENTS_EXCHANGE: customer.events
      CUSTOMER_EVENTS_ROUTING_KEY: customer.events
    ports:
      - "8081:8081"

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: account-service
    container_name: devsu-account-service
    depends_on:
      app-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ACCOUNT_DB_URL: jdbc:postgresql://app-db:5432/devsu_db?currentSchema=account_service
      ACCOUNT_DB_USERNAME: devsu
      ACCOUNT_DB_PASSWORD: devsu
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CUSTOMER_EVENTS_EXCHANGE: customer.events
      CUSTOMER_EVENTS_QUEUE: account.customer.events
      CUSTOMER_EVENTS_ROUTING_KEY: customer.events
    ports:
      - "8082:8082"

volumes:
  app-db-data:
