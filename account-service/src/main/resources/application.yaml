server:
  port: 8082

spring:
  application:
    name: account-service
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:postgresql://localhost:5432/accounts_db}
    username: ${ACCOUNT_DB_USERNAME:devsu}
    password: ${ACCOUNT_DB_PASSWORD:devsu}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  messaging:
    customer-events:
      exchange: ${CUSTOMER_EVENTS_EXCHANGE:customer.events}
      queue: ${CUSTOMER_EVENTS_QUEUE:account.customer.events}
      routing-key: ${CUSTOMER_EVENTS_ROUTING_KEY:customer.events}
